<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.2);
      z-index: 2;
    }

    #overlay.hidden { display: none; }

    #overlay img {
      width: 80%;
      opacity: 0.7;
    }
  </style>

  <script>
    AFRAME.registerComponent('spawn-fixed', {
      init: function () {
        const overlay = document.querySelector("#overlay");
        const scene = document.querySelector("a-scene");

        this.el.addEventListener('targetFound', () => {
          overlay.classList.add("hidden");

          if (document.querySelector("#fixed-box")) return;

          // ★ ワールド座標取得
          const worldPos = new THREE.Vector3();
          const worldQuat = new THREE.Quaternion();

          this.el.object3D.getWorldPosition(worldPos);
          this.el.object3D.getWorldQuaternion(worldQuat);

          const box = document.createElement("a-plane");

          box.setAttribute("id", "fixed-box");
          box.setAttribute("color", "red");
          box.setAttribute("opacity", "0.6");
          box.setAttribute("width", "2.4");
          box.setAttribute("height", "1.0");

          scene.appendChild(box);

          // ★ quaternion → rotation に変換
          const euler = new THREE.Euler().setFromQuaternion(worldQuat);

          box.object3D.position.copy(worldPos);
          box.object3D.rotation.copy(euler);

          // 右上に大きく移動
          box.object3D.position.x += 4;
          box.object3D.position.y += 1;
        });
      }
    });
  </script>
</head>

<body>

  <div id="overlay">
    <img src="./assets/marker.png">
  </div>

  <a-scene
    mindar-image="
      imageTargetSrc: ./assets/targets.mind;
      uiScanning: no;
    "
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" spawn-fixed></a-entity>

  </a-scene>

</body>
</html>
