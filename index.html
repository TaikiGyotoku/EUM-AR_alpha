<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.2);
      z-index: 2;
    }

    #overlay.hidden { display: none; }

    #overlay img {
      width: 80%;
      opacity: 0.7;
    }
  </style>

  <script>
    AFRAME.registerComponent('spawn-fixed', {
      init: function () {
        const overlay = document.querySelector("#overlay");
        const scene = document.querySelector("a-scene");

        this.el.addEventListener('targetFound', () => {
          overlay.classList.add("hidden");

          // 既に生成済みならスキップ
          if (document.querySelector("#fixed-box")) return;

          const pos = this.el.object3D.position.clone();
          const rot = this.el.object3D.rotation.clone();

          const box = document.createElement("a-plane");

          box.setAttribute("id", "fixed-box");
          box.setAttribute("color", "red");
          box.setAttribute("opacity", "0.6");
          box.setAttribute("width", "2.4");
          box.setAttribute("height", "1.0");

          // ★ 先に追加
          scene.appendChild(box);

          // ★ 少し待ってから位置設定（ここが超重要）
          setTimeout(() => {
            box.object3D.position.copy(pos);
            box.object3D.rotation.copy(rot);

            // 右上にずらす
            box.object3D.position.x += 4;
            box.object3D.position.y += 1;
          }, 0);
        });
      }
    });
  </script>
</head>

<body>

  <div id="overlay">
    <img src="./assets/marker.png">
  </div>

  <a-scene
    mindar-image="
      imageTargetSrc: ./assets/targets.mind;
      uiScanning: no;
    "
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" spawn-fixed></a-entity>

  </a-scene>

</body>
</html>
