<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #example-scanning-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.2);
      z-index: 2;
    }

    #example-scanning-overlay.hidden {
      display: none;
    }

    #example-scanning-overlay img {
      width: 80%;
      opacity: 0.7;
    }
  </style>

  <script>
    AFRAME.registerComponent('freeze-last-transform', {
      init: function () {
        this.frozen = false;
        this.lastPosition = null;
        this.lastRotation = null;
        this.lastScale = null;

        this.el.addEventListener('targetFound', () => {
          console.log("found");

          this.frozen = false;

          document.querySelector("#example-scanning-overlay")
            .classList.add("hidden");
        });

        this.el.addEventListener('targetLost', () => {
          console.log("lost");

          // 現在のTransformを保存
          this.lastPosition = this.el.object3D.position.clone();
          this.lastRotation = this.el.object3D.rotation.clone();
          this.lastScale = this.el.object3D.scale.clone();

          this.frozen = true;
        });
      },

      tick: function () {
        if (this.frozen && this.lastPosition) {
          // 保存した状態を維持
          this.el.object3D.position.copy(this.lastPosition);
          this.el.object3D.rotation.copy(this.lastRotation);
          this.el.object3D.scale.copy(this.lastScale);
        }
      }
    });
  </script>
</head>

<body>

  <!-- スキャンUI -->
  <div id="example-scanning-overlay">
    <img src="./assets/marker.png">
  </div>

  <a-scene
    mindar-image="
      imageTargetSrc: ./assets/targets.mind;
      uiScanning: #example-scanning-overlay;
    "
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ★ ここが重要 -->
    <a-entity mindar-image-target="targetIndex: 0" freeze-last-transform>

      <!-- 囲い -->
      <a-plane
        color="gray"
        opacity="0.6"
        width="2.4"
        height="1.0"
        position="1.2 0.9 0.05">
      </a-plane>

    </a-entity>

  </a-scene>

</body>
</html>
